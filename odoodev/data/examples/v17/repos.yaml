# Odoo v17 Repository Configuration
# Customize this file for your project
version: "17"
branch: "develop"
ssh_key: "~/.ssh/id_rsa"

paths:
  base: ~/gitbase/v17
  template: ~/gitbase/v17/v17-dev/conf/odoo17_template.conf
  config_dir: ~/gitbase/v17/myconfs

base_addons:
  - $HOME/gitbase/v17/v17-server/odoo/addons
  - $HOME/gitbase/v17/v17-server/addons

server:
  path: v17-server
  git_url: git@gitlab.ownerp.io:v17-odoo/v17-server.git

addons:
  - key: addons
    path: v17-addons
    git_url: git@gitlab.ownerp.io:v17-odoo/v17-addons.git
    section: Equitania
    use: false
    suffix: ""

  - key: oca
    path: v17-oca
    git_url: git@gitlab.ownerp.io:v17-odoo/v17-oca.git
    section: OCA
    use: false
    suffix: ""

