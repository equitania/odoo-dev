# Odoo v19 Repository Configuration
# Customize this file for your project
version: "19"
branch: "develop"
ssh_key: "~/.ssh/id_rsa"

paths:
  base: ~/gitbase/v19
  template: ~/gitbase/v19/v19-dev/conf/odoo19_template.conf
  config_dir: ~/gitbase/v19/myconfs

base_addons:
  - $HOME/gitbase/v19/v19-server/odoo/addons
  - $HOME/gitbase/v19/v19-server/addons

server:
  path: v19-server
  git_url: git@gitlab.ownerp.io:v19/v19-server.git

addons:
  - key: addons
    path: v19-addons
    git_url: git@gitlab.ownerp.io:v19/v19-addons.git
    section: Equitania
    use: true
    suffix: ""

  - key: oca
    path: v19-oca
    git_url: git@gitlab.ownerp.io:v19/v19-oca.git
    section: OCA
    use: true
    suffix: ""

