# Odoo v16 Repository Configuration
# Customize this file for your project
version: "16"
branch: "develop"
ssh_key: "~/.ssh/id_rsa"

paths:
  base: ~/gitbase/v16
  template: ~/gitbase/v16/v16-dev/conf/odoo16_template.conf
  config_dir: ~/gitbase/v16/myconfs

base_addons:
  - $HOME/gitbase/v16/v16-server/odoo/addons
  - $HOME/gitbase/v16/v16-server/addons

server:
  path: v16-server
  git_url: git@gitlab.ownerp.io:v16-odoo/v16-server.git

addons:
  - key: addons
    path: v16-addons
    git_url: git@gitlab.ownerp.io:v16-odoo/v16-addons.git
    section: Equitania
    use: true
    suffix: ""

  - key: oca
    path: v16-oca
    git_url: git@gitlab.ownerp.io:v16-odoo/v16-oca.git
    section: OCA
    use: true
    suffix: ""

