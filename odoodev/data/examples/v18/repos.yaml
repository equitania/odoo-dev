# Odoo v18 Repository Configuration
# Customize this file for your project
version: "18"
branch: "develop"
ssh_key: "~/.ssh/id_rsa"

paths:
  base: ~/gitbase/v18
  template: ~/gitbase/v18/v18-dev/conf/odoo18_template.conf
  config_dir: ~/gitbase/v18/myconfs

base_addons:
  - $HOME/gitbase/v18/v18-server/odoo/addons
  - $HOME/gitbase/v18/v18-server/addons

server:
  path: v18-server
  git_url: git@gitlab.ownerp.io:v18/v18-server.git

addons:
  - key: addons
    path: v18-addons
    git_url: git@gitlab.ownerp.io:v18/v18-addons.git
    section: Equitania
    use: true
    suffix: ""

  - key: oca
    path: v18-oca
    git_url: git@gitlab.ownerp.io:v18/v18-oca.git
    section: OCA
    use: true
    suffix: ""

